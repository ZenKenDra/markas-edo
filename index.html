<script>
        async function kirimPesan() {
            const apiKey = document.getElementById('apiKey').value;
            const promptText = document.getElementById('prompt').value;
            const hasilDiv = document.getElementById('hasil');

            if (!apiKey) {
                alert("Tolong masukkan API Key terlebih dahulu.");
                return;
            }
            if (!promptText) {
                alert("Tolong masukkan pertanyaanmu.");
                return;
            }

            hasilDiv.innerHTML = "<em>Sedang berpikir...</em>";

            try {
                // MENGUBAH URL KE AGENT ROUTER
                const response = await fetch('https://agentrouter.org/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}` 
                    },
                    body: JSON.stringify({
                        // MENGUBAH NAMA MODEL SESUAI SCREENSHOT
                        model: "deepseek-v3.1", 
                        messages: [{"role": "user", "content": promptText}],
                        temperature: 0.7
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    hasilDiv.textContent = data.choices[0].message.content;
                } else {
                    hasilDiv.innerHTML = `<span style="color: red;">Error: ${data.error ? data.error.message : 'Terjadi kesalahan pada API'}</span>`;
                }
            } catch (error) {
                hasilDiv.innerHTML = `<span style="color: red;">Gagal terhubung: ${error.message}</span>`;
            }
        }
    </script>
