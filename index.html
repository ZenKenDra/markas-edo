<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROTOTYPE - AI by ZetkayDev</title>
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #111111;
            --primary-red: #ff0033;
            --dark-red: #550011;
            --text-main: #e0e0e0;
            --text-muted: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 95vh;
            background-color: var(--panel-bg);
            border: 1px solid var(--primary-red);
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255, 0, 51, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Scanline effect */
        .container::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        header {
            background-color: #000;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--primary-red);
            position: relative;
            z-index: 3;
        }

        h1 {
            color: var(--primary-red);
            margin: 0;
            font-size: 2em;
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--primary-red);
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85em;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        .dev-badge {
            color: #fff;
            background-color: var(--dark-red);
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
            font-size: 0.8em;
            border: 1px solid var(--primary-red);
        }

        .settings-bar {
            background-color: #0a0a0a;
            padding: 10px 20px;
            border-bottom: 1px dashed var(--dark-red);
            display: flex;
            gap: 10px;
            align-items: center;
            z-index: 3;
        }

        .settings-bar label {
            color: var(--primary-red);
            font-size: 0.9em;
            font-weight: bold;
        }

        input[type="password"] {
            flex-grow: 1;
            background-color: #000;
            border: 1px solid var(--dark-red);
            color: var(--primary-red);
            padding: 8px;
            border-radius: 4px;
            font-family: inherit;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary-red);
            box-shadow: 0 0 5px rgba(255, 0, 51, 0.5);
        }

        .chat-area {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 3;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--dark-red); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-red); }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 6px;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
        }

        .message.system {
            align-self: center;
            background: transparent;
            color: var(--primary-red);
            font-size: 0.9em;
            text-align: center;
            border: 1px solid var(--dark-red);
            width: 80%;
        }

        .message.user {
            align-self: flex-end;
            background-color: #1a1a1a;
            color: #fff;
            border-left: 3px solid #555;
            border-top-right-radius: 0;
        }

        .message.ai {
            align-self: flex-start;
            background-color: #0a0000;
            color: #ffb3b3;
            border-left: 3px solid var(--primary-red);
            border-top-left-radius: 0;
            box-shadow: 2px 2px 10px rgba(255, 0, 51, 0.05);
        }

        .message-sender {
            font-size: 0.75em;
            margin-bottom: 5px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .user .message-sender { color: #aaa; text-align: right; }
        .ai .message-sender { color: var(--primary-red); font-weight: bold; text-align: left; }

        .input-area {
            padding: 20px;
            background-color: #000;
            border-top: 1px solid var(--primary-red);
            display: flex;
            gap: 15px;
            z-index: 3;
        }

        textarea {
            flex-grow: 1;
            background-color: #0a0a0a;
            border: 1px solid var(--dark-red);
            color: #fff;
            padding: 12px;
            border-radius: 4px;
            resize: none;
            height: 50px;
            font-family: inherit;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-red);
        }

        button {
            background-color: var(--dark-red);
            color: #fff;
            border: 1px solid var(--primary-red);
            padding: 0 25px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 1em;
            letter-spacing: 1px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background-color: var(--primary-red);
            color: #000;
            box-shadow: 0 0 15px var(--primary-red);
        }

        button:active {
            transform: scale(0.95);
        }

        .loading-blink {
            animation: blinker 1s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>[ PROTOTYPE ]</h1>
            <div class="subtitle">
                Artificial Intelligence Unit | Designed by <span class="dev-badge">ZetkayDev</span><br>
                <em>For Research, Development & Have Fun</em>
            </div>
        </header>

        <div class="settings-bar">
            <label for="apiKey">AUTH KEY:</label>
            <input type="password" id="apiKey" placeholder="Masukkan API Key Agent Router di sini (sk-...)">
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message system">
                > SYSTEM INITIALIZED.<br>
                > MODEL DEEPSEEK-V3.1 LOADED.<br>
                > WAITING FOR USER INPUT...
            </div>
        </div>

        <div class="input-area">
            <textarea id="promptInput" placeholder="Ketik perintah di sini..." onkeypress="handleEnter(event)"></textarea>
            <button onclick="executeCommand()" id="sendBtn">EXECUTE</button>
        </div>
    </div>

    <script>
        // Variabel untuk menyimpan riwayat percakapan agar AI ingat konteks
        let conversationHistory = [
            {
                "role": "system",
                "content": "Nama kamu adalah PROTOTYPE. Kamu adalah AI yang dibuat secara terang-terangan oleh ZetkayDev untuk tujuan penelitian dan have fun. Kamu berbicara dengan gaya yang sedikit teknis, keren, namun tetap asik dan interaktif."
            }
        ];

        function addMessageToUI(sender, text) {
            const chatArea = document.getElementById('chatArea');
            const msgDiv = document.createElement('div');
            
            if (sender === 'user') {
                msgDiv.className = 'message user';
                msgDiv.innerHTML = `<div class="message-sender">Operator</div><div>${text}</div>`;
            } else if (sender === 'ai') {
                msgDiv.className = 'message ai';
                // Konversi baris baru menjadi tag <br> agar rapi di HTML
                const formattedText = text.replace(/\n/g, '<br>');
                msgDiv.innerHTML = `<div class="message-sender">PROTOTYPE</div><div>${formattedText}</div>`;
            } else {
                msgDiv.className = 'message system';
                msgDiv.innerHTML = text;
            }

            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight; // Auto-scroll ke bawah
            return msgDiv; // Return elemen untuk bisa dimodifikasi (misal saat loading)
        }

        function handleEnter(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault(); // Mencegah enter membuat baris baru
                executeCommand();
            }
        }

        async function executeCommand() {
            const apiKeyInput = document.getElementById('apiKey').value.trim();
            const promptInput = document.getElementById('promptInput');
            const userText = promptInput.value.trim();
            const sendBtn = document.getElementById('sendBtn');

            if (!apiKeyInput) {
                addMessageToUI('system', '> ERROR: AUTH KEY (API Key) belum dimasukkan. Silakan isi di panel atas.');
                return;
            }

            if (!userText) return;

            // 1. Tampilkan pesan user di layar
            addMessageToUI('user', userText);
            
            // Simpan ke riwayat
            conversationHistory.push({"role": "user", "content": userText});

            // Kosongkan kotak input & matikan tombol sementara
            promptInput.value = '';
            promptInput.disabled = true;
            sendBtn.disabled = true;

            // 2. Buat elemen loading untuk AI
            const loadingMsg = addMessageToUI('ai', '<span class="loading-blink">PROCESSING...</span>');

            try {
                // 3. Panggil API Agent Router
                const response = await fetch('https://agentrouter.org/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKeyInput}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-v3.1",
                        messages: conversationHistory,
                        temperature: 0.7,
                        max_tokens: 2000
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    const aiResponseText = data.choices[0].message.content;
                    
                    // Update UI dengan jawaban asli
                    loadingMsg.innerHTML = `<div class="message-sender">PROTOTYPE</div><div>${aiResponseText.replace(/\n/g, '<br>')}</div>`;
                    
                    // Simpan jawaban AI ke riwayat
                    conversationHistory.push({"role": "assistant", "content": aiResponseText});
                } else {
                    loadingMsg.innerHTML = `<div class="message-sender">PROTOTYPE</div><div style="color: red;">> SYSTEM FAILURE: ${data.error ? data.error.message : 'Unknown API Error'}</div>`;
                    // Hapus pesan user terakhir dari history jika error, agar bisa dicoba lagi
                    conversationHistory.pop();
                }
            } catch (error) {
                loadingMsg.innerHTML = `<div class="message-sender">PROTOTYPE</div><div style="color: red;">> CONNECTION LOST: ${error.message}</div>`;
                conversationHistory.pop();
            } finally {
                // Nyalakan kembali input
                promptInput.disabled = false;
                sendBtn.disabled = false;
                promptInput.focus();
                
                // Scroll ke paling bawah
                const chatArea = document.getElementById('chatArea');
                chatArea.scrollTop = chatArea.scrollHeight;
            }
        }
    </script>
</body>
</html>
