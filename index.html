<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uji Coba API AI</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            max-width: 600px; 
            margin: 40px auto; 
            padding: 20px;
            color: #333;
        }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; }
        input, textarea, button { 
            width: 100%; 
            padding: 10px; 
            box-sizing: border-box; 
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        textarea { height: 100px; resize: vertical; }
        button { 
            margin-top: 15px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #0056b3; }
        #hasil { 
            margin-top: 20px;
            padding: 15px; 
            border: 1px solid #ddd; 
            border-radius: 5px; 
            min-height: 80px; 
            background: #f9f9f9; 
            white-space: pre-wrap; /* Agar baris baru (enter) dari AI tetap terbaca */
        }
    </style>
</head>
<body>

    <h2>Cobain API AI</h2>
    <p>Masukkan API Key dan pertanyaanmu di bawah ini.</p>

    <label for="apiKey">API Key (dimulai dengan sk-...):</label>
    <input type="password" id="apiKey" placeholder="Paste API Key di sini...">

    <label for="prompt">Apa yang ingin ditanyakan?</label>
    <textarea id="prompt" placeholder="Contoh: Buatkan ide permainan tebak kata yang seru untuk anak kelas 1 SD."></textarea>

    <button onclick="kirimPesan()">Kirim ke AI</button>

    <h3>Jawaban AI:</h3>
    <div id="hasil">Jawaban akan muncul di sini...</div>

    <script>
        async function kirimPesan() {
            const apiKey = document.getElementById('apiKey').value;
            const promptText = document.getElementById('prompt').value;
            const hasilDiv = document.getElementById('hasil');

            // Cek apakah kolom diisi
            if (!apiKey) {
                alert("Tolong masukkan API Key terlebih dahulu.");
                return;
            }
            if (!promptText) {
                alert("Tolong masukkan pertanyaanmu.");
                return;
            }

            // Tampilkan status proses
            hasilDiv.innerHTML = "<em>Sedang berpikir...</em>";

            try {
                // Mengirim permintaan ke server OpenAI
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}` // Menggunakan API key
                    },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo", // Model standar yang cukup pintar dan murah
                        messages: [{"role": "user", "content": promptText}],
                        temperature: 0.7
                    })
                });

                const data = await response.json();

                // Cek apakah respon berhasil
                if (response.ok) {
                    hasilDiv.textContent = data.choices[0].message.content;
                } else {
                    // Tampilkan pesan error jika API key salah atau kuota habis
                    hasilDiv.innerHTML = `<span style="color: red;">Error: ${data.error.message}</span>`;
                }
            } catch (error) {
                hasilDiv.innerHTML = `<span style="color: red;">Gagal terhubung ke internet atau API: ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
